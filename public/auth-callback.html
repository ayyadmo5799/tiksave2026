<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Dropbox Auth — TikSave</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070810;color:#eef0ff;font-family:'Cairo',sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;flex-direction:column;gap:16px;text-align:center;padding:24px;}
.icon{font-size:3rem;}
h2{font-size:1.15rem;font-weight:900;}
p{color:#8891aa;font-size:.85rem;line-height:1.7;max-width:380px;}
.code-box{background:rgba(96,239,255,.08);border:1px solid rgba(96,239,255,.25);
  padding:14px 20px;border-radius:12px;font-family:monospace;font-size:.82rem;
  color:#60efff;word-break:break-all;max-width:480px;cursor:pointer;
  transition:background .2s;}
.code-box:hover{background:rgba(96,239,255,.15);}
.copy-hint{font-size:.72rem;color:#5a607a;margin-top:-6px;}
.spinner{width:36px;height:36px;border-radius:50%;
  border:3px solid rgba(255,255,255,.08);border-top-color:#fe2c55;
  animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.err{color:#ff4757;}
</style>
</head>
<body>
<div id="app"><div class="spinner"></div></div>
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var code   = params.get('code');
  var error  = params.get('error');
  var app    = document.getElementById('app');

  if(error){
    app.innerHTML = '<div class="icon">❌</div><h2>رُفض التفويض</h2><p class="err">'+error+'</p><p>أغلق هذه النافذة وحاول مرة أخرى.</p>';
    return;
  }
  if(!code){
    app.innerHTML = '<div class="icon">⚠️</div><h2>لم يُعثر على كود</h2><p>أغلق هذه النافذة وحاول مرة أخرى.</p>';
    return;
  }

  // Try postMessage to opener
  var sent = false;
  if(window.opener && !window.opener.closed){
    try{
      window.opener.postMessage({type:'DROPBOX_AUTH_CODE', code:code}, '*');
      sent = true;
    }catch(e){}
  }

  if(sent){
    app.innerHTML = '<div class="icon">✅</div><h2>تم! جاري إغلاق النافذة…</h2><p>تم إرسال الكود للموقع تلقائياً.</p>';
    setTimeout(function(){ window.close(); }, 1200);
  } else {
    // Manual fallback — show code with one-click copy
    app.innerHTML =
      '<div class="icon">🔑</div>' +
      '<h2>انسخ هذا الكود</h2>' +
      '<p>اضغط عليه للنسخ ثم ارجع لتبويب TikSave والصقه في الحقل:</p>' +
      '<div class="code-box" id="cb">'+code+'</div>' +
      '<p class="copy-hint">اضغط لنسخ الكود</p>';
    document.getElementById('cb').onclick = function(){
      navigator.clipboard.writeText(code).then(function(){
        document.getElementById('cb').textContent = '✅ تم النسخ!';
        setTimeout(function(){ document.getElementById('cb').textContent = code; }, 2000);
      }).catch(function(){
        // fallback select
        var r = document.createRange();
        r.selectNode(document.getElementById('cb'));
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(r);
      });
    };
  }
})();
</script>
</body>
</html>
